name: "Provisinion Talos Cluster"

on:
  pull_request:
    branches:
      - main

jobs:
  wakeup-homelab:
    runs-on: self-hosted
    env:
      mercury_mac: ${{ secrets.MERCURY_MAC }}
      venus_mac: ${{ secrets.VENUS_MAC }}
      neptune_mac: ${{ secrets.NEPTUNE_MAC }}
      pluto_mac: ${{ secrets.PLUTO_MAC }}
      saturn_mac: ${{ secrets.SATURN_MAC }}
      RUN_WAKEUP: false
    if: ${{ env.RUN_WAKEUP == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check python version
        run: python --version

      - name: Install dependencies
        working-directory: ./scripts
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Wakeup Homelab Nodes
        working-directory: ./scripts
        run: |
          python3 wakeuphomelab.py

  terraform:
    needs: wakeup-homelab
    runs-on: self-hosted 
    env:
      TF_VAR_proxmox_node: mercury.proxmox.home.arpa
      TF_VAR_proxmox_api_user: root@pam
      TF_VAR_proxmox_api_token_id: terraform-token
      TF_VAR_proxmox_api_token_secret: ${{ secrets.PROXMOX_API_TOKEN_SECRET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "auto"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.13.4 

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform Fmt & Validate
        working-directory: ./terraform
        run: terraform fmt --recursive -check && terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Save Plan as Artifact
            uses: actions/upload-artifact@v4
            with:
              name: terraform-binary-plan  
              path: ./terraform/tfplan     
              retention-days: 7

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -input=false -auto-approve
  

  sync-cluster-configuration-flux:
    needs: bootstrap-talos-cluster
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Check flux version
        run: flux --version
      
      - name: Set KUBECONFIG
        run: echo "KUBECONFIG=/etc/kubernetes/config" >> $GITHUB_ENV

      - name: Wait for Kubernetes API
        run: |
          set -e
          for i in {1..30}; do
            if kubectl get nodes &>/dev/null; then
              echo "Kubernetes API ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 10
          done
          exit 1

      - name: Wait for nodes ready
        run: |
          set -e
          for i in {1..30}; do
            if kubectl get nodes | grep -q Ready; then
              echo "Nodes ready"
              exit 0
            fi
            echo "Waiting for nodes..."
            sleep 10
          done
          exit 1

      - name: Bootstrap Cluster Configuration Repository 
        env:
          GITHUB_TOKEN: ${{ secrets.FLUX_PAT_SECRET }}
        run: flux bootstrap github --token-auth --owner=Samuelnorth47 --repository=cluster-configuration --path=clusters/test-cluster --personal --verbose
